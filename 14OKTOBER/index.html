<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Pulsa</title>
    <style>
        .utama{
            width: 100%;
            height: 100vh;
            background-color: red;
        }
        .navbar{
            width: 100%;
            height: 10vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .navbar1{
            width: 85%;
            height: 10vh;
            display: flex;
            justify-content: end;
            align-items: center;
        }
        .navbar2{
            width: 50%;
            height: 10vh;
            display: flex;
            justify-content: end;
            align-items: center;
        }
        .navbar2 h3{
            margin-right: 5%;
            cursor: pointer;    
            border-radius: 10px;
        }
        .kotak-bawah1{
            width: 7%;
            height: 89.5vh;
        }
        .bulat{
            width: 80%;
            height: 9vh;
            background-color: white;
            border-radius: 50%;
            margin-top: 580px;
            margin-left: 8px;
        }
        .name{
            color: white;
        }
        .name p{
            margin-left: 5px;
            margin-top: 5px;
        }
        .kotak-bawah{
            width: 100%;
            height: 89.5vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .kotak-bawah2{
            width: 100%;
            height: 91vh;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bks-kotak-bawah2{
            width: 90%;
            height: 80vh;
        }
        label{
            font-size: 30px;
        }
        button{
            width: 10%;
            height: 7vh;
            background-color: red;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }
        .harga-container{
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
            align-items: center;
        }
        .harga-item{
            padding: 10px 15px;
            border-radius: 6px;
            background-color: rgb(215, 215, 215);
            width: 150px;
            height: 60px;
            margin-left: 20px;
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            cursor: pointer;
        }
        input{
            width: 45%;
            height: 10vh; 
            font-size: 27px;
        }



        @media(max-width:667px){
            .utama{
                flex-wrap: wrap;
            }
            .navbar1 h1{
                font-size: 18px;
            }
            .navbar h3{
                font-size: 13px;
            }
            .kotak-bawah1{
                display: none;
            }
            label{
                font-size: 25px;
            }
            input{
                width: 90%;
                margin-left: 2px;
            }
            button{
                width: 30%;
            }
        }
    </style>
</head>
<body>
    <div class="utama">
        <div class="navbar">
            <div class="navbar1">
                <h1>Top Up Pulsa by Kenneth Anthony Ng 8A</h1>
            </div>
            <div class="navbar2">
                <h3>Sign Out</h3>
            </div>
        </div>
        <div class="kotak-bawah">
            <div class="kotak-bawah1">
            <div class="bulat">

            </div>
            <div class="name">
                <p>Kenneth Anthony Ng</p>
            </div>
        </div>
        <div class="kotak-bawah2">
            <div class="bks-kotak-bawah2">
                <label for="">Masukan Nomor HP Tujuan :</label><br>
                <input type="number" id="phone" placeholder="Masukan No HP : 0852"><br>
                <button>Buy</button>
                <div style="font-size: 25px; margin-top: 10px;" id="operatorInfo"></div>
                <div style="font-size: 20px; margin-top: 10px; margin-right: 30px;" id="hargaList"></div>
            </div>
        </div>
        </div>
    

    </div>

    <script>
        const operatorData = [
            {
                name: 'Telkomsel',
                preFixes: ['0852','0813','0821','0821','0823','0822'],
                harga: [5000,10000,15000,25000,50000,100000]
            },
            {
                name: 'Indosat',
                preFixes: ['0855','0856','0816','0815'],
                harga: [5000,10000,15000,25000,50000,100000]
            },
            {
                name: 'Tri',
                preFixes: ['0897','0898','0896','0895'],
                harga: [5000,10000,15000,25000,50000,100000]
            },
            {
                name: 'Exis',
                preFixes: ['0838','0831'],
                harga: [5000,10000,15000,25000,50000,100000]
            },
            {
                name: 'SMARFREN',
                preFixes: ['0882','0881','0888','0889'],
                harga: [5000,10000,15000,25000,50000,100000]
            },
            {
                name: 'XL',
                preFixes: ['0887','0878','0877','0819','0817'],
                harga: [5000,10000,15000,25000,50000,100000]
            },
        ];

        const phoneInput = document.getElementById('phone')
        const operatorInfo = document.getElementById('operatorInfo')
        const hargaList = document.getElementById('hargaList')

        phoneInput.addEventListener('input', function(){
            const nomor = phoneInput.value.trim();
            const prefix = nomor.slice(0, 4)

            let operator = null;

            for (let i = 0; i < operatorData.length; i++){
                if(operatorData[i].preFixes.includes(prefix)){
                    operator = operatorData[i];
                    break;
                }
            }

            if(operator){
                operatorInfo.innerHTML = "Operator Terdeteksi : " + operator.name;
                hargaList.innerHTML = "<div class ='harga-container'>" + operator.harga.map(h => `<div class='harga-item'>Rp ${h.toLocaleString('id-ID')}</div>`).join('')+"</div>";
            }else{
                operatorInfo.innerText = "Operator Tidak Dikenali"
                hargaList.innerHTML = "";
            }
        })
    </script>
</body>
</html>
