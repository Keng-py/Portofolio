<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambahan Nilai ASAS</title>
    <style>
        body{
            background: linear-gradient(360deg,#aaa,#bbb);
            background-repeat: no-repeat;
            background-size: cover;
            height: 90vh;
        }

        .container{
            background-color: #120c0c46;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            font-family: Arial, sans-serif;
            animation: border-glow 2s infinite;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
            animation: pulse-glow 2s infinite;
        }

        .textarea{
            width: 95%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            resize: none;
            animation: second-glow 2s infinite;
            transition: 2s all ease;
        }

        .counter-container{
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            animation: back-glow 2s infinite;
        }

        .total-counter, .remaining-counter{
            font-weight: bold;
        }

        p{
            animation: text-glow 2s infinite;
        }

        textarea:hover{
            scale: 1.05;
        }

        .counter-container{
            border-radius: 5px;
            background-color: #ccc;
            padding: 10px;
        }

        @keyframes border-glow {
            0%, 100% {
                box-shadow: 0 0 20px aliceblue, 0 0 30px aliceblue, 0 0 40px aliceblue;
            }
            50% {
                box-shadow: 0 0 15px aliceblue, 0 0 18px aliceblue, 0 0 30px aliceblue;
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                text-shadow:
                0 0 5px aliceblue,
                0 0 10px aliceblue,
                0 0 20px aliceblue,
                0 0 40px aliceblue;
            }
            50% {
                text-shadow:
                0 0 2px aliceblue,
                0 0 4px aliceblue,
                0 0 10px aliceblue,
                0 0 20px aliceblue;
            }
        }

        @keyframes text-glow {
            0%, 100% {
                text-shadow:
                0 0 5px rgb(15, 90, 155),
                0 0 10px rgb(15, 90, 155),
                0 0 20px rgb(15, 90, 155),
                0 0 40px rgb(15, 90, 155);
            }
            50% {
                text-shadow:
                0 0 2px rgb(15, 90, 155),
                0 0 4px rgb(15, 90, 155),
                0 0 10px rgb(15, 90, 155),
                0 0 20px rgb(15, 90, 155);
            }
        }

        @keyframes back-glow {
            0%, 100% {
                box-shadow:
                0 0 5px rgb(15, 90, 155),
                0 0 10px rgb(15, 90, 155),
                0 0 20px rgb(15, 90, 155),
                0 0 40px rgb(15, 90, 155);
            }
            50% {
                box-shadow:
                0 0 2px rgb(15, 90, 155),
                0 0 4px rgb(15, 90, 155),
                0 0 10px rgb(15, 90, 155),
                0 0 20px rgb(15, 90, 155);
            }
        }

         @keyframes second-glow {
            0%, 100% {
                box-shadow:
                0 0 5px rgb(9, 7, 15),
                0 0 10px rgb(9, 7, 15),
                0 0 20px rgb(9, 7, 15),
                0 0 40px rgb(9, 7, 15);
            }
            50% {
                box-shadow:
                0 0 2px aliceblue,
                0 0 4px aliceblue,
                0 0 10px aliceblue,
                0 0 20px aliceblue;
            }
        }

        @media(max-width:667px){
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Real-time Character Counter</h2>
        <textarea id="textarea" class="textarea" placeholder="Please write your text here..." maxlength="50"></textarea>
        <div class="counter-container">
            <p>
                Total Characters:
                <span class="total-counter" id="total-counter"></span>
            </p>
            <p>
                Remaining:
                <span class="remaining-counter" id="remaining-counter"></span>
            </p>
        </div>
    </div>
    <script>
        const textareaEl = document.getElementById('textarea')
        const totalCounterEl = document.getElementById('total-counter')
        const remainingCounterEl = document.getElementById('remaining-counter')   

        textareaEl.addEventListener("keyup", () => {
            updateCounter();
        });

        updateCounter()

        function updateCounter() {
            totalCounterEl.innerText = textareaEl.value.length;
            remainingCounterEl.innerText =
            textareaEl.getAttribute('maxlength') - textareaEl.value.length;
        }
    </script>
</body>
</html>
