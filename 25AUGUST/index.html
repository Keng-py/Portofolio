<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25 AUGUST 2025</title>
    <style>
        body{
            display: grid;
            align-items: center;
            justify-content: center;
            background: linear-gradient(360deg,rgb(0, 149, 255),rgb(60, 7, 237));
            background-size: cover;
            background-repeat: no-repeat;
            height: 97vh;
        }

        @keyframes border-glow {
            0%, 100% {
                box-shadow: 0 0 10px #0ff, 0 0 10px #0ff, 0 0 20px rgb(166, 255, 0);
            }
            50% {
                box-shadow: 0 0 10px rgb(179, 0, 255), 0 0 10px rgb(179, 0, 255), 0 0 10px rgb(179, 0, 255);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                text-shadow:
                0 0 5px #0ff,
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 40px #0ff;
            }
            50% {
                text-shadow:
                0 0 2px #0ff,
                0 0 4px #0ff,
                0 0 10px #0ff,
                0 0 20px #0ff;
            }
        }

        .calculator{
            padding: 2%;
            animation: border-glow 2s infinite;
            width: 400px;
            height: 400px;
            display: grid;
            background: linear-gradient(360deg,rgb(0, 251, 255),rgb(202, 7, 237));
            border-radius: 10px;
            gap: 5px;
            margin-bottom: 50px;
        }

        input{
            border-radius: 5px;
            margin-bottom: 5%;
        }

        .buttons{
            width: 400px;
            height: 100%;
            display: grid;
        }

        button{
            border: none;
            background-color: black;
            color: aliceblue;
            width: 96px;
            height: 30px;
            transition: 2s;
            border-radius: 5px;
        }

        input{
            background-color: rgba(0, 238, 255, 0.726);
            border: none;
        }

        button:hover{
            animation: border-glow 2s infinite;
        }

        .c button{
            width: 76px;

        }

        h1{
            margin-bottom: 50px;
            margin-left: 8%;
        }

        h2{
            margin-top: 20px;
            height: 1vh;
            margin-left: 11%;
            font-weight: bold;
            font-size: 50pt;
            animation: pulse-glow 2s infinite;
        }

        @media(max-width:667px){
            .calculator{
                width: 340px;
                height: 300px;
            }

            .calculator h2{
                font-size: 50pt;
            }

            h1{
                font-size: 25pt;
            }

            .buttons{
                width: 340px;
                gap: 10px;
            }

            button{
                width: 70px;
                height: 30px;
            }

            .d button{
                width: 55px;
            }
        }
    </style>
</head>
<body>
    <h1>Kenneth Anthony.Ng 8A</h1>
    <div class="calculator">
        <h2>Calculator</h2>
        <input type="text" id="result" readonly>
        <div class="buttons">
            <div class="a">
                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
                <button class="clear">C</button>
            </div>
            <div class="b">
                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="operator">/</button>
            </div>
            <div class="c">
                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="number">0</button>
                <button class="operator">*</button>
            </div>
            <div class="d">
                <button class="operator">+</button>
                <button class="operator">-</button>
                <button class="operator">=</button>
                <button class="decimal">.</button>
            </div>
        </div>
    </div>
    <script>
        const buttonEL = document.querySelectorAll("button");
        const inputFieldEl = document.getElementById("result");

        for(let i = 0; i < buttonEL.length; i++){
            buttonEL[i].addEventListener("click", () =>{
                const buttonValue = buttonEL[i].textContent;
                if(buttonValue === "C"){
                    clearResult();
                }
                else if(buttonValue === "="){
                    calculateResult();
                }
                else{
                    appendValue(buttonValue);
                }
            })
        }
        function clearResult(){
            inputFieldEl.value = "";
        }
        function calculateResult(){
            inputFieldEl.value = eval(inputFieldEl.value);
        }
        function appendValue(buttonValue){
            inputFieldEl.value += buttonValue;
        }
    </script>
</body>
</html>
