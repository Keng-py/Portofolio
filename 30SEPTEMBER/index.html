<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 SEPTEMBER 2025</title>
    <style>
        body{
            padding: 0px;
            margin: 0px;
            font-family: sans-serif;
            background: linear-gradient(45deg, rgb(6, 12, 15), #1c3746ff);
            overflow: hidden;
        }
        nav{
            background-color: #1818b1;
            color: white;
            padding: 0.5rem 1rem;
            position: relative;
        }

        canvas{
            display: none;
        }

        h2 {
            display: flex;
            justify-content: center;
            align-items: center;
            color: aliceblue;
            animation: pulse-glow 3s infinite;
            color: #0ff;
            font-weight: bold;
            font-size: 19pt;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-decoration: underline;
        }

        .bungkus {
            width: 100%;
            gap: 4px;
            display: flex;
            padding: 1%;
        }

        @keyframes border-glow {
            0%, 100% {
                box-shadow: 0 0 5px rgb(217, 65, 4), 0 0 10px rgb(217, 65, 4), 0 0 20px rgb(217, 65, 4);
            }
            50% {
                box-shadow: 0 0 2px rgb(217, 65, 4), 0 0 4px rgb(217, 65, 4), 0 0 10px rgb(217, 65, 4);
            }
        }

        @keyframes second-glow {
            0%, 100% {
                box-shadow: 0 0 5px rgb(155, 155, 239), 0 0 10px rgb(155, 155, 239), 0 0 20px rgb(155, 155, 239);
            }
            50% {
                box-shadow: 0 0 2px rgb(155, 155, 239), 0 0 4px rgb(155, 155, 239), 0 0 10px rgb(155, 155, 239);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                text-shadow:
                    0 0 5px #0ff,
                    0 0 10px #0ff,
                    0 0 20px #0ff,
                    0 0 40px #0ff;
            }
            50% {
                text-shadow:
                    0 0 2px #0ff,
                    0 0 4px #0ff,
                    0 0 10px #0ff,
                    0 0 20px #0ff;
            }
        }

        @keyframes plus-glow {
            0%, 100% {
                text-shadow:
                    0 0 5px aliceblue,
                    0 0 10px aliceblue,
                    0 0 20px aliceblue,
                    0 0 40px aliceblue;
            }
            50% {
                text-shadow:
                    0 0 2px aliceblue,
                    0 0 4px aliceblue,
                    0 0 10px aliceblue,
                    0 0 20px aliceblue;
            }
        }

        .part {
            width: 50%;
            height: 100%;
            display: grid;
            gap: 4px;
        }

        video {
            width: 85%;
            background-color: rgb(44, 35, 35);
            height: 360px;
            object-fit: cover;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            border-radius: 10px;
            animation: 2s infinite second-glow;
        }

        button{
            border-radius: 7px;
            padding: 2%;
            width: 20%;
            margin-top: 2%;
            margin-bottom: 5%;
            background-color: brown;
            color: aliceblue;
            border: none;
            transition: 0.3s all;
        }

        .right {
            width: 100%;
            max-width: 610px;
            height: 480px;
            background-color: black;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .foto {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 4px;
            scrollbar-color: red black;
            height: 100%;
            overflow-y: scroll;
            background-color: black;
            min-height: 240px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        .foto img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            animation: 2s infinite second-glow;
        }

        button:hover {
            background-color: rgb(255, 0, 0);
            cursor: pointer;
            animation: border-glow 2s infinite;
            transform: scale(1.1);
        }

        h4 {
            font-weight: bold;
            font-size: 16pt;
            margin-bottom: 30px;
            margin-top: 0px;
            text-decoration: underline;
            color: rgb(19, 23, 26);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            animation: plus-glow 3s infinite;
        }

        @media(max-width:667px){
            body{
                display: block;
                overflow-y: scroll;
            }

            .part{
                width: 110%;
                height: auto;
            }

            video{
                display: flex;
                justify-content: center;
                align-items: center;
            }


            .bungkus{
                display: block;
            }

            .foto {
                grid-template-columns: repeat(1,1fr);
            }
        }
    </style>
</head>
<body>
    <nav>
        <h2>Fotobox Free Use by Kenneth Anthony Ng 8A</h2>
    </nav>
    <div class="bungkus">
        <div class="part">
            <h4>Smile for the camera | Chessss</h4>
            <video src="" id="video" autoplay></video>
            <button id="snap">Take Foto</button>
        </div>
        <div class="right">
            <canvas id="canvas"></canvas>
            <div class="foto" id="photos"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const snapButton = document.getElementById('snap');
        const canvas = document.getElementById('canvas');
        const photosDiv = document.getElementById('photos')
        const context = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({video : true})
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err =>{
                console.log('tidak bisa akses kamera',err);
            })

            snapButton.addEventListener('click',()=>{
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imgData = canvas.toDataURL('image/png');
                const img = document.createElement('img');
                img.src = imgData;
                photosDiv.appendChild(img);
            });
            canvas.width = 350;
            canvas.height = 240;
    </script>
</body>
</html>
