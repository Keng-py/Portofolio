    <div class="container">
        <div class="inner">
            <h1>Function operator</h1>
            <p>Masukan nilai suhu :</p>
            <input placeholder="ENTER VALUE" id="num1" type="number">
            <p>Suhu Awal</p>
            <select name="" id="awal">
            <option value="celcius">Celcius</option>
            <option value="reamur">Reamur</option>
            <option value="farenheit">Farenheit</option>
            <option value="kelvin">Kelvin</option>
            </select>
            <p>Konvert Ke</p>
            <select name="" id="akhir">
            <option value="celcius">Celcius</option>
            <option value="reamur">Reamur</option>
            <option value="farenheit">Farenheit</option>
            <option value="kelvin">Kelvin</option>
            </select>
            <p>HASIL : <span id="hasil"></span></p>
            <button onclick="btn()">Hitung</button>
        </div>
    </div>

    <script>
        function btn(){
            let a1 = parseFloat(document.getElementById('num1').value);
            let select1 = document.getElementById('awal').value;
            let select2 = document.getElementById('akhir').value;
            if(select1 == "celcius" && select2 == "celcius"){
                let jumlah = a1
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "celcius" && select2 == "reamur"){
                let jumlah = 4 / 5 * a1
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "celcius" && select2 == "farenheit"){
                let jumlah = 9 / 5 * a1 + 32
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "celcius" && select2 == "kelvin"){
                let jumlah = a1 + 273
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "reamur" && select2 == "celcius"){
                let jumlah = 5 / 4 * a1
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "reamur" && select2 == "reamur"){
                let jumlah = a1
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "reamur" && select2 == "farenheit"){
                let jumlah = 9 / 4 * a1 + 32
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "reamur" && select2 == "kelvin"){
                let jumlah = 5 / 4 * a1 +273
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "farenheit" && select2 == "celcius"){
                let jumlah = 5 / 9 * (a1 - 32)
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "farenheit" && select2 == "reamur"){
                let jumlah = 4 / 9 * (a1 - 32)
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "farenheit" && select2 == "farenheit"){
                let jumlah = a1
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "farenheit" && select2 == "kelvin"){
                let jumlah = 5 / 9 * (a1 - 32) + 273
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "kelvin" && select2 == "celcius"){
                let jumlah = a1 - 273
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "kelvin" && select2 == "reamur"){
                let jumlah = 4 / 5 * (a1 - 273)
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "kelvin" && select2 == "farenheit"){
                let jumlah = 9 / 5 * (a1 - 273) + 32
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else if(select1 == "kelvin" && select2 == "kelvin"){
                let jumlah = a1
                document.getElementById('hasil').innerHTML = jumlah;
            }
            else{
                let jumlah = a1
                document.getElementById('hasil').innerHTML = jumlah;
            }
        }
    </script>
</body>
