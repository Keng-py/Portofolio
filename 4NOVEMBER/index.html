<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing App</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(360deg,rgb(62, 60, 60),rgb(245, 232, 232),rgb(62, 60, 60));
            margin: 0;
            background-repeat: no-repeat;
            height: 100vh;
        }

        canvas{
            border: 5px solid rgb(23, 234, 205);
            background-color: rgba(240, 248, 255, 0.523);
            animation: second-glow 2s infinite;
        }

        .container{
            display: grid;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .toolbox{
            background-color: gray;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1%;
            border: 5px solid rgb(23, 234, 205);
            animation: second-glow 2s infinite;
        }

        h1{
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0px;
            margin-bottom: 7px;
            margin-top: 7px;
            text-decoration: underline;
            animation: pulse-glow 2s infinite;
        }

        button{
            padding: 1%;
            padding-left: 5%;
            padding-right: 5%;
            background-color: rgb(67, 63, 63);
            color: white;
            border: 3px solid aqua;
            transition: 0.5s all ease;
            border-radius: 5px;
        }

        button:hover{
            background-color: rgb(109, 92, 92);
            scale: 1.1;
            cursor: pointer;
            animation: border-glow 2s infinite;
        }

        span{
            padding: 1%;
        }

        input{
            background-color: rgb(67, 63, 63);
            border: 3px solid black;
            width: 50%;
        }

        @keyframes border-glow {
            0%, 100% {
                box-shadow: 0 0 20px aliceblue, 0 0 30px aliceblue, 0 0 40px aliceblue;
            }
            50% {
                box-shadow: 0 0 15px aliceblue, 0 0 18px aliceblue, 0 0 30px aliceblue;
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                text-shadow:
                0 0 5px aliceblue,
                0 0 10px aliceblue,
                0 0 20px aliceblue,
                0 0 40px aliceblue;
            }
            50% {
                text-shadow:
                0 0 2px aliceblue,
                0 0 4px aliceblue,
                0 0 10px aliceblue,
                0 0 20px aliceblue;
            }
        }

        @keyframes second-glow {
            0%, 100% {
                box-shadow:
                0 0 5px aqua,
                0 0 10px aqua,
                0 0 20px aqua,
                0 0 40px aqua;
            }
            50% {
                box-shadow:
                0 0 2px aqua,
                0 0 4px aqua,
                0 0 10px aqua,
                0 0 20px aqua;
            }
        }

        @media(max-width:667px){
            *{
                overflow: hidden;
            }
            h1{
                display: flex;
                justify-content: center;
            }
            body{
                display: block;
                padding: 2px;
            }
            .container{
                display: block;
            }

            canvas{
                width: 358px;
                height: 490px;
                margin-bottom: 10%;
            }

            input{
                width: 20%;
            }

            .toolbox{
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Drawing Board</h1>
        <canvas id="canvas" width="800" height="430"></canvas>
        <div class="toolbox">
            <button id="decrease"> - </button>
            <span id="size">10</span>
            <button id="increase"> + </button>
            <input type="color" id="color">
            <button id="clear"> X </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const increaseBtn = document.getElementById('increase');
        const decreaseBtn = document.getElementById('decrease');
        const sizeEl = document.getElementById('size');
        const colorEl = document.getElementById('color');
        const clearEl = document.getElementById('clear');

        const ctx = canvas.getContext('2d');

        let size = 10;
        let isPressed = false
        colorEl.value = 'black';
        let color = colorEl.value;
        let x;
        let y;

        canvas.addEventListener('mousedown', (e) =>{
            isPressed = true;
            x = e.offsetX
            y = e.offsetY
        })

        document.addEventListener('mouseup', (e)=> {
            isPressed = false;

            x = undefined
            y = undefined
        })

        canvas.addEventListener('mousemove', (e)=>{
            if(isPressed){
                const x2 = e.offsetX
                const y2 = e.offsetY

                drawCircle(x2, y2)
                drawLine(x, y, x2, y2)

                x = x2
                y = y2
            }
        })

        function drawCircle(x,y){
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2)
            ctx.fillStyle = color
            ctx.fill()
        }

        function drawLine(x1, y1, x2, y2){
            ctx.beginPath()
            ctx.moveTo(x1, y1)
            ctx.lineTo(x2, y2)
            ctx.strokeStyle = color
            ctx.lineWidth = size * 2
            ctx.stroke()
        }

        function updateSizeOnScreen(){
            sizeEl.innerText = size
        }

        increaseBtn.addEventListener('click', ()=>{
            size += 5
            if(size < 5){
                size = 15
            }
            updateSizeOnScreen()
        })

        decreaseBtn.addEventListener('click', ()=>{
            size -= 5
            if(size < 5){
                size = 5
            }
            updateSizeOnScreen()
        })
        colorEl.addEventListener('change', (e) => color = e.target.value)
        clearEl.addEventListener('click', () => ctx.clearRect(0,0,canvas.width, canvas.height))
    </script>
</body>
</html>
