<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(360deg,black,white,black);
            padding-top: 3%;
            overflow: auto;
        }
        .container{
            display: block;
            justify-content: center;
            align-items: center;
            background-color: gray;
            width: 50%;
            border: 5px solid black;
            height: 100%;
            padding-bottom: 15%;
            border-radius: 5%;
            animation: border-glow 2s infinite;
        }    
        h1{
            font-size: 30pt;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: underline;
            animation: pulse-glow 2s infinite;
        }

        input{
            padding: 5%;
            background-color: black;
            color: white;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 33%;
            border-radius: 5%;
        }

        li{
            list-style: none;
            margin-left: 0%;
            width: 90%;
            margin: 5px;
            text-align: center;
            justify-content: center;
            display: flex;
            background-color: aqua;
            cursor: pointer;
            border: 3px solid black;
            border-radius: 5px;
            animation: border-glow 2s infinite;
        }

        small{
            text-align: center;
            justify-content: center;
            display: flex;
            color: white;
            padding: 5%;
            margin-top: 5%;
        }

        .todos li.completed {
            background-color: aquamarine;
        }

        @keyframes border-glow {
            0%, 100% {
                box-shadow: 0 0 20px aliceblue, 0 0 30px aliceblue, 0 0 40px aliceblue;
            }
            50% {
                box-shadow: 0 0 15px aliceblue, 0 0 18px aliceblue, 0 0 30px aliceblue;
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                text-shadow:
                0 0 5px aliceblue,
                0 0 10px aliceblue,
                0 0 20px aliceblue,
                0 0 40px aliceblue;
            }
            50% {
                text-shadow:
                0 0 2px aliceblue,
                0 0 4px aliceblue,
                0 0 10px aliceblue,
                0 0 20px aliceblue;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todos</h1>
        <form id="form">
            <input type="text" id="input" class="input" placeholder="Enter your todo" autocomplete="off">
            <ul class="todos" id="todos"></ul>
        </form>
        <small>Left click to toggle completed. <br> Right click to delete todo</small>
    </div>

    <script>
        const form = document.getElementById('form')
        const input = document.getElementById('input')
        const todosUL = document.getElementById('todos')

        const todos = JSON.parse(localStorage.getItem('todos'))

        if(todos){
            todos.forEach(todo => addTodo(todo))
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault()
            addTodo()
        })

        function addTodo(todo){
            let todoText = input.value

            if(todo){
                todoText = todo.text
            }

            if(todoText){
                const todoEl = document.createElement('li')
                if(todo && todo.completed){
                    todoEl.classList.add('completed')
                }
                    
                todoEl.innerText = todoText

                todoEl.addEventListener('click', () => {
                    todoEl.classList.toggle('completed')
                    updateLS()
                })

                todoEl.addEventListener('contextmenu', (e) => {
                    e.preventDefault()

                    todoEl.remove()
                    updateLS()
                })

                todosUL.appendChild(todoEl)

                input.value = ' '

                updateLS()
            }
        }

        function updateLS(){
            todosEl = document.querySelectorAll('li')
            
            const todos = []
            
            todosEl.forEach((todoEl) => {
                todos.push({
                    text: todoEl.innerText,
                    completed: todoEl.classList.contains('completed')
                })
            })

            localStorage.setItem('todos', JSON.stringify(todos))
        }
    </script>
</body>
</html>
